services:
  spark-master:
    image: spark:4.1.2-scala2.13-java21-python3-ubuntu
    container_name: w4m2-spark-master
    hostname: spark-master

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"

    ports:
      - "7077:7077"
      - "8080:8080"

    volumes:
      - ../:/opt/w4m2

    networks:
      - spark-network

  spark-worker-1:
    image: spark:4.1.2-scala2.13-java21-python3-ubuntu
    container_name: w4m2-spark-worker-1
    hostname: spark-worker-1

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2G
      - --webui-port
      - "8081"

    ports:
      - "8081:8081"

    volumes:
      - ../:/opt/w4m2

    depends_on:
      - spark-master

    networks:
      - spark-network

  spark-worker-2:
    image: spark:4.1.2-scala2.13-java21-python3-ubuntu
    container_name: w4m2-spark-worker-2
    hostname: spark-worker-2

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2G
      - --webui-port
      - "8081"

    ports:
      - "8082:8081"

    volumes:
      - ../:/opt/w4m2

    depends_on:
      - spark-master

    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge