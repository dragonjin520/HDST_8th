services:
  spark-master:
    image: w4m1-spark:3.5.6
    container_name: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./src:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output
      - ./logs:/opt/spark-logs
    networks:
      - spark-network

  spark-worker-1:
    image: w4m1-spark:3.5.6
    container_name: spark-worker-1
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./src:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output
      - ./logs:/opt/spark-logs
    networks:
      - spark-network
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1g

  spark-worker-2:
    image: w4m1-spark:3.5.6
    container_name: spark-worker-2
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    volumes:
      - ./src:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output
      - ./logs:/opt/spark-logs
    networks:
      - spark-network
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1g

networks:
  spark-network:
    driver: bridge