x-hadoop-image: &hadoop-image hadoop-base:3.3.6

services:
  master:
    image: *hadoop-image
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: hadoop-master
    hostname: master
    environment:
      NODE_ROLE: master
    ports:
      - "9870:9870"
      - "8088:8088"
    volumes:
      - namenode-data:/data/hdfs/namenode
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
    networks:
      - hadoop-network
    stdin_open: true
    tty: true
    command: ["bash", "-c", "tail -f /dev/null"]

  worker1:
    image: *hadoop-image
    container_name: hadoop-worker1
    hostname: worker1
    environment:
      NODE_ROLE: worker
    volumes:
      - datanode1-data:/data/hdfs/datanode
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
    networks:
      - hadoop-network
    depends_on:
      - master
    stdin_open: true
    tty: true
    command: ["bash", "-c", "tail -f /dev/null"]

networks:
  hadoop-network:
    driver: bridge

volumes:
  namenode-data:
  datanode1-data:
