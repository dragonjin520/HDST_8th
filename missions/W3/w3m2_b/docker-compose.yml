x-hadoop-image: &hadoop-image hadoop-base:3.3.6

services:
  namenode:
    image: *hadoop-image
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: hadoop-master
    hostname: namenode
    environment:
      NODE_ROLE: master
    ports:
      - "9000:9000"
      - "9870:9870"
      - "8088:8088"
    volumes:
      - namenode-data:/hadoop/dfs/name
      - ./config/modified/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/modified/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/modified/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/modified/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./scripts/start-hadoop.sh:/opt/scripts/start-hadoop.sh:ro
    networks:
      - hadoop-network
    stdin_open: true
    tty: true
    command: ["bash", "/opt/scripts/start-hadoop.sh"]

  worker1:
    image: *hadoop-image
    container_name: hadoop-worker1
    hostname: worker1
    environment:
      NODE_ROLE: worker
    volumes:
      - datanode1-data:/hadoop/dfs/data
      - ./config/modified/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/modified/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/modified/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/modified/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./scripts/start-hadoop.sh:/opt/scripts/start-hadoop.sh:ro
    networks:
      - hadoop-network
    depends_on:
      - namenode
    stdin_open: true
    tty: true
    command: ["bash", "/opt/scripts/start-hadoop.sh"]

  worker2:
    image: *hadoop-image
    container_name: hadoop-worker2
    hostname: worker2
    environment:
      NODE_ROLE: worker
    volumes:
      - datanode2-data:/hadoop/dfs/data
      - ./config/modified/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/modified/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/modified/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/modified/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./scripts/start-hadoop.sh:/opt/scripts/start-hadoop.sh:ro
    networks:
      - hadoop-network
    depends_on:
      - namenode
    stdin_open: true
    tty: true
    command: ["bash", "/opt/scripts/start-hadoop.sh"]

networks:
  hadoop-network:
    driver: bridge

volumes:
  namenode-data:
  datanode1-data:
  datanode2-data:
